name: Sync to Hugging Face hub

on:
  push:
    branches: [main] # 监听 main 分支的推送事件
  workflow_dispatch: # 支持从 Actions 页面手动触发

jobs:
  sync-to-hub:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0
          lfs: true
      - name: Push to Hugging Face Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: git push https://Estellayi:$HF_TOKEN@huggingface.co/spaces/Estellayi/myRobot main